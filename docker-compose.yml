# Optional: real Postgres for parity runs. Dev/tests use H2 in PostgreSQL
# mode and need no containers at all.
services:
  postgres:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: paperdesk
      POSTGRES_USER: paperdesk
      POSTGRES_PASSWORD: paperdesk
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paperdesk -d paperdesk"]
      interval: 10s
      timeout: 5s
      retries: 20
